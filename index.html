<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YCT Stock Checker</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--red:#c0392b;--red-dark:#922b21;--red-light:#e74c3c;--bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--border:#333;--text:#f0f0f0;--dim:#888;--green:#27ae60;--gbg:#0d2b1a;--orange:#e67e22;--blue:#3498db;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
/* Header */
.hdr{background:var(--bg2);border-bottom:2px solid var(--red);padding:13px 24px;display:flex;align-items:center;gap:15px;position:sticky;top:0;z-index:100;}
.logo{width:38px;height:38px;background:var(--red);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;font-family:'IBM Plex Mono',monospace;flex-shrink:0;}
.ht{font-size:17px;font-weight:700;}.hs{font-size:11px;color:var(--dim);font-family:'IBM Plex Mono',monospace;}
.hpills{margin-left:auto;display:none;gap:10px;align-items:center;}
.pill{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 11px;font-size:11px;font-family:'IBM Plex Mono',monospace;display:flex;align-items:center;gap:5px;}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}.dg{background:var(--green)}.dr2{background:var(--red-light)}.do{background:var(--orange)}.db{background:var(--blue)}
/* Layout */
.wrap{max-width:1400px;margin:0 auto;padding:22px;display:grid;grid-template-columns:340px 1fr;gap:22px;}
.lp{display:flex;flex-direction:column;gap:13px;}
/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.ch{background:var(--bg3);padding:10px 15px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--dim);display:flex;align-items:center;gap:7px;}
.cb{padding:15px;}


</style>
</head>
<body>
<p>Loading...</p>
</body>
</html>
